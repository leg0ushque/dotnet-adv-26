services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQLSERVER_SA_PASSWORD}
      - MSSQL_TCP_PORT=1433
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "pgrep", "sqlservr"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  sql-init-keycloak:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${SQLSERVER_SA_PASSWORD} -Q "IF DB_ID('${KC_DBNAME}') IS NULL CREATE DATABASE ${KC_DBNAME}"

  adminer:
    image: adminer
    restart: always
    ports:
      - 8082:8080

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - 27017:27017

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    container_name: keycloak
    environment:
      - KC_DB=mssql
      - KC_DB_URL=jdbc:sqlserver://sqlserver:1433;databaseName=${KC_DBNAME};trustServerCertificate=true
      - KC_DB_USERNAME=${KC_DB_USERNAME}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_STRICT=false
    volumes:
      - ./Ecommerce-realm.json:/opt/keycloak/data/import/Ecommerce-realm.json
    ports:
      - "8090:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    command: start 

  sql-init-sonarqube:
    profiles: ["sonar"] 
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${SQLSERVER_SA_PASSWORD} -Q \
          "IF DB_ID('${SONAR_DBNAME}') IS NULL
           CREATE DATABASE [${SONAR_DBNAME}] COLLATE SQL_Latin1_General_CP1_CS_AS"
        
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${SQLSERVER_SA_PASSWORD} -Q \
          "IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = '${SONAR_DB_USERNAME}')
           CREATE LOGIN [${SONAR_DB_USERNAME}] WITH PASSWORD = '${SONAR_DB_PASSWORD}'"
        
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${SQLSERVER_SA_PASSWORD} \
          -d ${SONAR_DBNAME} -Q \
          "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = '${SONAR_DB_USERNAME}')
           BEGIN
             CREATE USER [${SONAR_DB_USERNAME}] FOR LOGIN [${SONAR_DB_USERNAME}];
             ALTER ROLE db_owner ADD MEMBER [${SONAR_DB_USERNAME}];
           END"
          
  sonarqube:
    profiles: ["sonar"] 
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      sqlserver:
        condition: service_healthy
      sql-init-sonarqube:
        condition: service_completed_successfully
    environment:
      SONAR_JDBC_URL: jdbc:sqlserver://sqlserver:1433;databaseName=${SONAR_DBNAME};trustServerCertificate=true
      SONAR_JDBC_USERNAME: ${SONAR_DB_USERNAME}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    ports:
      - "9000:9000"